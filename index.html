<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      id="theme-favicon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <script>
      /* Chave: portfolio-theme (ver src/constants/theme.ts) */
      (function () {
        var t = localStorage.getItem("portfolio-theme");
        var theme;
        if (t === "light" || t === "dark") {
          theme = t;
        } else {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
        var icon = document.getElementById("theme-favicon");
        if (icon) {
          // Use the href already set by Vite (which includes the correct base path),
          // and derive the light variant from it to avoid hardcoding /portfolio/.
          var darkHref = icon.href;
          var lightHref = darkHref.replace("favicon.svg", "favicon-light.svg");
          icon.href = theme === "dark" ? darkHref : lightHref;
        }
      })();
    </script>
